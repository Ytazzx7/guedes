<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Unit - Central Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-box">
            <div class="spinner"></div>
            <h1>Carregando Recursos</h1>
            <p class="sub">Inicializando ambiente seguro...</p>
        </div>
    </div>

    <!-- CONTEÚDO -->
    <main id="main-content">
        <header>
            <div class="logo">ATLAS <span>UNIT</span></div>
            <p class="subtitle">Central de Comunicados Oficiais</p>
        </header>

        <section class="announcements">
            <div class="card">
                <span class="tag alert">IMPORTANTE</span>
                <h2>⏳ Manutenção Programada</h2>
                <p>
                    
- Iremos fazer mais uma pausa para uma manutenção, e o bot ficará desligado às *20:00* até *18:00 amanhã.*

- Aproveitem e usem os comandos hoje.
                </p>
                <span class="date">05/03, 2026</span>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
